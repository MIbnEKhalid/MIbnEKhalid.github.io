<!DOCTYPE html> 

<html lang="en" dir="ltr">

   <head>
        <link rel="stylesheet" href="https://mbktechstudio.com/Assets/cookie.css"/>
  </head>

  <body> 
        <div id="cookieNotice" class="light display-right" style="display: block;">
          
            <span style="display: none;" id="termsVersion">Version: 0.4</span>
            <div id="closeIcon" onclick="hideCookieNotice();"></div>
       
            <div class="title-wrap">
                <h4>Cookie Consent</h4>
            </div>

            <div class="content-wrap">
                <div class="msg-wrap">
                    <p onclick="AskForCookieConsent()">This website uses cookies. By continuing to use our website, you agree to our  <a href="https://privacy.mbktechstudio.com/" target="_blank">Privacy Policy</a></p>
                    <div class="btn-wrap">
                        <button id="agreeButton" class="btn-primary" onclick="SaveCookie();">ACCEPT</button>
                    </div>
                </div>
            </div>

        </div>
  </body>
<div id="cookie"></div>
  <script src="https://mbktechstudio.com/Assets/script.js"></script>
  <script>

    
function AskForCookieConsent() {
    fetch('https://mbktechstudio.com/Assets/cookie.html')
    .then(response => response.text())
    .then(html => {
        document.getElementById('cookie').innerHTML = html;
        return getTermsVersionFromPrivacyPolicy(); // Call the new function
    })
    .then(termsVersion => {
        if (termsVersion) {
            checkCookie(termsVersion);
        } else {
            console.error('Terms version could not be retrieved.');
        }
    });
}


function getTermsVersionFromPrivacyPolicy() {
    return fetch('https://privacy.mbktechstudio.com/')
    .then(response => response.text())
    .then(html => {
        let parser = new DOMParser();
        let doc = parser.parseFromString(html, 'text/html');
        let termsVersionElement = doc.getElementById('termsVersion');
        if (termsVersionElement) {
            return termsVersionElement.innerText.split(': ')[1];
        } else {
            throw new Error('Element with id "termsVersion" not found.');
        }
    })
    .catch(err => {
        console.error('Failed to fetch or parse the privacy policy page:', err);
        return null;
    });
}





  </script>

 
</html>
