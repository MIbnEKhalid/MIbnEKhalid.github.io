[[redirects]]
  from = "https://test-mbktechstudio.netlify.app/*"
  to = "https://test.mbktechstudio.com/:splat"
  status = 301
  force = true


[[redirects]]
  from = "/api/*"
  to = "https://privacy.mbktechstudio.com/:splat"
  status = 200
  headers = { 
    "Access-Control-Allow-Origin" = "*",
    "Access-Control-Allow-Methods" = "GET, OPTIONS",
    "Access-Control-Allow-Headers" = "Content-Type"
  }
